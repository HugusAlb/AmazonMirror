<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon.com.br</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div class="navbar">
      <div class="logo">
        <img class="logoNavBar" src="/assets/navbar/Amazon_Logo_2.webp" alt="Logo da amazon.com.br">
      </div>
      <div class="myCurrentLocation">
        <p>Delivery to</p>
        <p>My Location</p>
      </div>
      <div class="search-bar">
        <input class="search-bar" placeholder="Search in Amazon">
      </div>
      <div class="language">
        <p>pt-br</p>
      </div>
      <div class="login">
        <p>Hello, sign in</p>
        <p>Dropdown</p>
      </div>
      <div class="refundsAndReturns">
        <p>Returns</p>
        <p><strong>& Orders</strong></p>
      </div>
      <div class="cart">
        <p>LogoCart</p>
        <p>Cart</p>
      </div>
    </div>
  </header>

  <div class="container">
  </div>
</body>

</html>
