<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon.com.br</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
</head>

<body>

  <header>
    <div class="navbar">
      <div class="logo">
        <img class="logoNavBar" src="/assets/navbar/Amazon_Logo_2.webp" alt="Logo da amazon.com.br">
      </div>
      <div class="myCurrentLocation">
        <p>Delivery to</p>
        <div style="display: flex; gap: 3px;">
          <i class="fa-solid fa-location-dot"></i>
          <p>My Location</p>
        </div>
      </div>
      <div class="search-bar">
        <select class="select-searchbar">
          <option>All</option>
        </select>
        <input class="input-searchbar" placeholder="Search in Amazon">
        <button class="button-searchbar">
          <i class="fa fa-search"></i>
        </button>
      </div>
      <div class="language">
        <span class="fi fi-br"></span>
        <p>pt-br</p>
      </div>
      <div class="login">
        <p>Hello, sign in</p>
        <p>Dropdown</p>
      </div>
      <div class="refundsAndReturns">
        <p>Returns</p>
        <p><strong>& Orders</strong></p>
      </div>
      <div class="cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <p>Cart</p>
      </div>
    </div>
  </header>

  <div class="container">
  </div>
</body>

</html>
